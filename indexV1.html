<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DICE TYCOON</title>
<style>
  :root{
    --bg:#14110f;
    --felt:#1d2a1f;
    --gold:#e0a84e;
    --cream:#ece4d3;
    --red:#c1543f;
    --green:#7fa86f;
    --ink:#0a0908;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--cream);
    font-family:'Courier New', monospace;
    display:flex;
    justify-content:center;
    padding:20px 10px 60px;
  }
  #app{width:100%;max-width:660px;}
  h1{
    font-size:28px;
    letter-spacing:4px;
    text-align:center;
    color:var(--gold);
    margin:0 0 4px;
    text-shadow:0 0 12px rgba(224,168,78,0.35);
  }
  .sub{text-align:center;color:#8a8378;font-size:12px;letter-spacing:2px;margin-bottom:16px;}

  .panel{
    background:var(--felt);
    border:2px solid #33402f;
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:14px;
    box-shadow:inset 0 0 30px rgba(0,0,0,0.3);
  }
  .row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
  .stat{font-size:13px;color:#cfc8b8;}
  .stat b{color:var(--gold);}

  .dice-row{display:flex;justify-content:center;gap:10px;margin:18px 0;flex-wrap:wrap;}
  .die{
    width:56px;height:56px;
    background:var(--cream);
    color:var(--ink);
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:bold;
    position:relative;
    border:3px solid #00000022;
    cursor:pointer;
    transition:transform .12s ease;
    user-select:none;
  }
  .die.locked{background:var(--gold);border-color:#a87a2e;}
  .die.wild{box-shadow:0 0 0 3px var(--red),0 0 14px var(--red);}
  .die:active{transform:scale(0.93);}
  .die .tag{
    position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    background:var(--red);color:white;font-size:8px;padding:1px 4px;border-radius:6px;
    letter-spacing:0.5px;white-space:nowrap;
  }
  .die .lockedlabel{
    position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
    background:#333;color:var(--gold);font-size:8px;padding:1px 4px;border-radius:6px;
  }

  .sumline{text-align:center;font-size:13px;color:#a7e0a0;margin-top:-8px;margin-bottom:2px;letter-spacing:1px;}
  .sumline b{color:var(--gold);font-size:16px;}

  .previewbox{
    text-align:center;margin-top:8px;padding:8px 10px;border-radius:8px;
    background:#0f1a10;border:1px dashed var(--green);
  }
  .previewbox .big{font-size:22px;color:var(--gold);font-weight:bold;}
  .previewbox .breakdown{font-size:11px;color:#9fcf95;margin-top:2px;}

  .controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
  button{
    font-family:inherit;
    background:var(--gold);
    color:var(--ink);
    border:none;
    padding:10px 16px;
    border-radius:6px;
    font-size:13px;
    font-weight:bold;
    letter-spacing:1px;
    cursor:pointer;
    transition:filter .1s;
  }
  button:hover{filter:brightness(1.1);}
  button:disabled{background:#555;color:#999;cursor:default;}
  button.secondary{background:#3a4a36;color:var(--cream);}
  button.danger{background:var(--red);color:white;}
  button.small{padding:5px 9px;font-size:11px;}
  button.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}

  .jokers{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .joker{
    background:#26201a;
    border:1px solid var(--gold);
    border-radius:6px;
    padding:6px 8px;
    font-size:11px;
    max-width:170px;
    color:var(--cream);
  }
  .joker b{color:var(--gold);display:block;font-size:12px;margin-bottom:2px;}
  .joker .sellrow{margin-top:6px;display:flex;justify-content:space-between;align-items:center;}

  .hand-readout{text-align:center;font-size:13px;color:#a7e0a0;min-height:18px;margin-top:4px;}

  .log{
    font-size:12px;color:#9a9486;max-height:90px;overflow-y:auto;
    border-top:1px solid #33402f;padding-top:8px;margin-top:10px;
  }
  .log div{margin-bottom:3px;}

  .shop-card{
    background:#26201a;border:1px solid var(--gold);border-radius:8px;padding:10px;margin-bottom:8px;
  }
  .shop-card b{color:var(--gold);}
  .shop-card p{font-size:12px;margin:4px 0 8px;color:#cfc8b8;}
  .rarity{font-size:9px;padding:1px 6px;border-radius:8px;margin-left:6px;letter-spacing:0.5px;}
  .rarity.common{background:#3a4a36;color:var(--cream);}
  .rarity.rare{background:var(--red);color:white;}

  .overlay{text-align:center;}
  .overlay h2{color:var(--gold);letter-spacing:2px;}
  .badge{display:inline-block;background:var(--red);color:white;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;}
  .boss{color:var(--red);font-weight:bold;}
  .megaboss{color:#ff6b4a;font-weight:bold;text-shadow:0 0 6px rgba(255,107,74,0.5);}

  table.combos{width:100%;border-collapse:collapse;font-size:12px;}
  table.combos th,table.combos td{padding:4px 6px;text-align:left;border-bottom:1px solid #33402f;}
  table.combos th{color:var(--gold);font-size:11px;}

  details.refbox summary{cursor:pointer;color:var(--gold);font-size:13px;margin-bottom:6px;}

  .encyclopedia{max-height:420px;overflow-y:auto;text-align:left;}
</style>
</head>
<body>
<div id="app">
  <h1>DICE TYCOON</h1>
  <div class="sub">a roguelite of rolls, locks, and loaded dice</div>
  <div id="root"></div>
</div>

<script>
/* ============== DATA ============== */
const JOKER_POOL = [
  {id:'mag6', name:'Magnetic 6', desc:'6s also count as 1s for straights.', rarity:'common', cost:6},
  {id:'lucky7', name:'Lucky 7', desc:'If dice sum is 7, 17 or 27 → x3 Mult.', rarity:'common', cost:7},
  {id:'weighted1', name:'Weighted 1', desc:'Each 1 is worth 10 chips instead of 1.', rarity:'common', cost:6},
  {id:'gambler', name:"Gambler's Fallacy", desc:'Any 1 rolled → x2 Mult (stacks per 1).', rarity:'common', cost:8},
  {id:'highroller', name:'High Roller', desc:'If dice sum ≥ 24 → +2 Mult.', rarity:'common', cost:6},
  {id:'lowball', name:'Lowball', desc:'If dice sum ≤ 10 → +30 chips.', rarity:'common', cost:5},
  {id:'evensteven', name:'Even Steven', desc:'All 5 dice even → x2 Mult.', rarity:'common', cost:7},
  {id:'oddjob', name:'Odd Job', desc:'All 5 dice odd → +40 chips.', rarity:'common', cost:7},
  {id:'tokenmint', name:'Token Mint', desc:'+1 Luck Token at the start of every round.', rarity:'common', cost:7},
  {id:'extraroll', name:'Steady Hand', desc:'+1 reroll per hand.', rarity:'common', cost:8},
  {id:'momentum', name:'Momentum', desc:'+5 chips for every reroll you used this hand.', rarity:'common', cost:6},
  {id:'minimalist', name:'Minimalist', desc:'Score without using a single reroll → +50 chips.', rarity:'common', cost:7},
  {id:'straightshooter', name:'Straight Shooter', desc:'Any straight (small or large) → +50 chips flat.', rarity:'common', cost:8},
  {id:'pairbond', name:'Pair Bond', desc:'Two Pair hands → +50 chips.', rarity:'common', cost:6},

  {id:'shattered', name:'Shattered Die', desc:'Hand is a straight → x3 Mult.', rarity:'rare', cost:12},
  {id:'doubleornothing', name:'Double or Nothing', desc:'Coin flip after scoring: heads x2, tails x0.', rarity:'rare', cost:10},
  {id:'hotstreak', name:'Hot Streak', desc:'+1 Mult per consecutive Ante beaten (resets on fail).', rarity:'rare', cost:12},
  {id:'twinprimes', name:'Twin Primes', desc:'A pair of prime dice (2,3,5) doubles that pair\'s chip value.', rarity:'rare', cost:10},
  {id:'loadeddeck', name:'Loaded Deck', desc:'+1 reroll per hand.', rarity:'rare', cost:9},
  {id:'jackpot', name:'Jackpot', desc:'Five of a Kind → +200 chips on top of normal score.', rarity:'rare', cost:13},
  {id:'wildbond', name:'Wild Bond', desc:'This hand\'s Wild Die ability is always DOUBLE or LUCKY.', rarity:'rare', cost:11},
  {id:'chainlightning', name:'Chain Lightning', desc:'Each round you skip the shop, +1 Chip income on your next clear.', rarity:'rare', cost:9},
  {id:'fullhousefanatic', name:'Full House Fanatic', desc:'Full House → x2 Mult.', rarity:'rare', cost:11},
  {id:'voidwalker', name:'Void Walker', desc:'Removes this hand\'s Wild Die entirely, but grants +60 chips flat instead.', rarity:'rare', cost:10},
];

const WILD_ABILITIES = [
  {id:'double', name:'DOUBLE', tag:'x2 value', desc:'This die counts twice toward chips.'},
  {id:'wild', name:'WILD', tag:'mirrors best', desc:'Copies the value of your highest other die.'},
  {id:'volatile', name:'VOLATILE', tag:'auto-reroll', desc:'Rerolls itself every roll, even if locked.'},
  {id:'lucky', name:'LUCKY', tag:'+25 chips', desc:'Adds flat +25 chips if it\'s part of the scoring hand.'},
  {id:'frozen', name:'FROZEN', tag:'free lock', desc:'Can\'t be rerolled this hand, but never costs a Luck Token to lock.'},
  {id:'greedy', name:'GREEDY', tag:'+1 Mult', desc:'Adds +1 flat Mult to the final score this hand.'},
  {id:'cursed', name:'CURSED', tag:'-15 chips', desc:'Subtracts 15 chips from the final score. Risk that comes free.'},
  {id:'rich', name:'RICH', tag:'+10 chips', desc:'A small, reliable +10 chips, no conditions.'},
  {id:'jinxed', name:'JINXED', tag:'±30 chips', desc:'50/50: either +30 chips or -30 chips, decided at scoring.'},
  {id:'anchor', name:'ANCHOR', tag:'straight helper', desc:'Also counts as its neighboring numbers when checking for straights.'},
];

const BOSS_BLINDS = [
  {id:'equalizer', name:'The Equalizer', desc:'First roll forces all dice to 3 or 4.', nerf:'Rolls open clustered — straights are hard to build.'},
  {id:'oddtax', name:'Odd Tax', desc:'If every die is odd, the hand scores 0.', nerf:'All-odd hands are wiped.'},
  {id:'purist', name:'The Purist', desc:'Only "Pair" hands score. Everything else scores 0.', nerf:'Big hands are worthless this round.'},
  {id:'mirage', name:'Mirage', desc:'Unlocked dice faces are hidden until you lock them.', nerf:'You\'re rerolling blind.'},
  {id:'gravitywell', name:'Gravity Well', desc:'Only 1 reroll this hand, regardless of jokers.', nerf:'Jokers granting rerolls are ignored.'},
  {id:'taxman', name:'The Taxman', desc:'All chip bonuses from Loaded Dice are halved this hand.', nerf:'Your flat-chip jokers are half as strong.'},
  {id:'silencer', name:'The Silencer', desc:'All Mult bonuses from Loaded Dice are ignored this hand.', nerf:'Mult-granting jokers do nothing.'},
];

const HANDS = [
  {id:'five', name:'Five of a Kind', base:100, test:c=>Object.values(c).some(n=>n===5)},
  {id:'four', name:'Four of a Kind', base:70, test:c=>Object.values(c).some(n=>n===4)},
  {id:'largestraight', name:'Large Straight', base:60, test:(c,vals)=>isStraight(vals,5)},
  {id:'fullhouse', name:'Full House', base:50, test:c=>{const v=Object.values(c);return v.includes(3)&&v.includes(2);}},
  {id:'smallstraight', name:'Small Straight', base:40, test:(c,vals)=>isStraight(vals,4)},
  {id:'three', name:'Three of a Kind', base:30, test:c=>Object.values(c).some(n=>n===3)},
  {id:'twopair', name:'Two Pair', base:20, test:c=>Object.values(c).filter(n=>n===2).length>=2},
  {id:'pair', name:'Pair', base:10, test:c=>Object.values(c).some(n=>n===2)},
  {id:'chance', name:'Chance (fallback)', base:'sum of dice', test:()=>false},
];

function isStraight(vals, len){
  const u = [...new Set(vals)].sort((a,b)=>a-b);
  for(let i=0;i<=u.length-len;i++){
    let ok=true;
    for(let j=1;j<len;j++){ if(u[i+j]!==u[i]+j){ok=false;break;} }
    if(ok) return true;
  }
  return false;
}

/* ============== STATE ============== */
let state = null;

function freshState(carryChips){
  return {
    screen:'intro',
    round:1,
    anteTarget:50,
    metaChips: carryChips||0,
    hotStreakCount:0,
    noBuyStreak:0,
    dice:[1,1,1,1,1],
    locked:[false,false,false,false,false],
    hidden:[false,false,false,false,false],
    rerollsLeft:3,
    rerollsBase:3,
    rerollsUsed:0,
    luckTokens:3,
    jokers:[],
    wildDie:null,
    bossBlind:null,
    isMega:false,
    lastScoreText:'',
    log:[],
    shopOffers:[],
  };
}

function addLog(msg){
  state.log.unshift(msg);
  state.log = state.log.slice(0,6);
}

function isBossRound(r){ return r % 3 === 0; }
function isMegaBossRound(r){ return r % 6 === 0; }
function hasJoker(id){ return state.jokers.some(j=>j.id===id); }

function startRound(){
  state.dice = rollDice(5);
  state.locked = [false,false,false,false,false];
  state.hidden = [false,false,false,false,false];
  state.rerollsUsed = 0;
  state.rerollsLeft = state.rerollsBase + (hasJoker('loadeddeck')?1:0) + (hasJoker('extraroll')?1:0);

  state.bossBlind = null;
  state.isMega = false;
  if(isBossRound(state.round)){
    state.bossBlind = BOSS_BLINDS[Math.floor(Math.random()*BOSS_BLINDS.length)];
    if(isMegaBossRound(state.round)){
      state.isMega = true;
      // mega boss stacks a SECOND nerf and a tougher target
      let second = BOSS_BLINDS[Math.floor(Math.random()*BOSS_BLINDS.length)];
      let tries=0;
      while(second.id===state.bossBlind.id && tries<10){ second = BOSS_BLINDS[Math.floor(Math.random()*BOSS_BLINDS.length)]; tries++; }
      state.bossBlind2 = second;
      state.anteTarget = Math.round(state.anteTarget * 1.35);
    } else {
      state.bossBlind2 = null;
    }
  }

  if(state.bossBlind && state.bossBlind.id==='gravitywell'){ state.rerollsLeft = 1; }
  if(state.bossBlind2 && state.bossBlind2.id==='gravitywell'){ state.rerollsLeft = 1; }

  if(hasJoker('tokenmint')) state.luckTokens = Math.min(5, state.luckTokens+1);

  const idx = Math.floor(Math.random()*5);
  let pool = WILD_ABILITIES;
  if(hasJoker('wildbond')) pool = WILD_ABILITIES.filter(a=>a.id==='double'||a.id==='lucky');
  const ability = pool[Math.floor(Math.random()*pool.length)];
  state.wildDie = {index: idx, ability};

  if(activeBoss().some(b=>b.id==='equalizer')){
    state.dice = state.dice.map(()=> (Math.random()<0.5?3:4));
  }
  if(activeBoss().some(b=>b.id==='mirage')){
    state.hidden = [true,true,true,true,true];
  }
  state.lastScoreText='';
  const bossLabel = state.bossBlind? ` [${state.isMega?'MEGA BOSS: ':''}${state.bossBlind.name}${state.bossBlind2? ' + '+state.bossBlind2.name:''}]` : '';
  addLog(`-- Round ${state.round} begins. Target: ${state.anteTarget}${bossLabel} --`);
  state.screen='hand';
  render();
}

function activeBoss(){
  return [state.bossBlind, state.bossBlind2].filter(Boolean);
}

function rollDice(n){
  return Array.from({length:n},()=>1+Math.floor(Math.random()*6));
}

function toggleLock(i){
  if(state.screen!=='hand') return;
  state.locked[i] = !state.locked[i];
  if(state.hidden[i] && state.locked[i]) state.hidden[i]=false;
  render();
}

function doReroll(){
  if(state.rerollsLeft<=0) return;
  for(let i=0;i<5;i++){
    const isWildVolatile = state.wildDie && state.wildDie.index===i && state.wildDie.ability.id==='volatile';
    const isFrozen = state.wildDie && state.wildDie.index===i && state.wildDie.ability.id==='frozen';
    if(isFrozen) continue;
    if(!state.locked[i] || isWildVolatile){
      state.dice[i] = 1+Math.floor(Math.random()*6);
    }
  }
  state.rerollsLeft--;
  state.rerollsUsed++;
  render();
}

function lockWithLuck(i){
  if(state.luckTokens<=0) return;
  state.luckTokens--;
  state.locked[i]=true;
  if(state.hidden[i]) state.hidden[i]=false;
  render();
}

function effectiveValues(){
  let vals = [...state.dice];
  if(state.wildDie && state.wildDie.ability.id==='wild' && !hasJoker('voidwalker')){
    const {index} = state.wildDie;
    const others = vals.filter((_,i)=>i!==index);
    vals[index] = Math.max(...others);
  }
  return vals;
}

function diceSum(){ return state.dice.reduce((a,b)=>a+b,0); }

function computeBestHand(vals){
  let straightVals = [...vals];
  if(hasJoker('mag6')){
    straightVals = straightVals.flatMap(v=> v===6 ? [6,1] : [v]);
  }
  if(state.wildDie && state.wildDie.ability.id==='anchor' && !hasJoker('voidwalker')){
    const v = vals[state.wildDie.index];
    straightVals = [...straightVals, v-1, v+1].filter(x=>x>=1&&x<=6);
  }
  const counts = {};
  vals.forEach(v=>counts[v]=(counts[v]||0)+1);

  if(activeBoss().some(b=>b.id==='purist')){
    if(Object.values(counts).some(n=>n===2)){
      return {hand: HANDS.find(h=>h.id==='pair'), counts, vals: straightVals};
    }
    return {hand:{id:'none', name:'Nothing (Purist)', base:0}, counts, vals: straightVals};
  }

  for(const h of HANDS){
    if(h.id==='chance') continue;
    if(h.test(counts, straightVals)) return {hand:h, counts, vals: straightVals};
  }
  return {hand:{id:'chance', name:'Chance', base: vals.reduce((a,b)=>a+b,0)}, counts, vals: straightVals};
}

// Pure calculation -- no side effects. Used by both the live preview and the real scoring.
function calcScore(){
  const vals = effectiveValues();
  const useWild = state.wildDie && !hasJoker('voidwalker');
  const { hand } = computeBestHand(vals);
  const sum = vals.reduce((a,b)=>a+b,0);
  const bosses = activeBoss();
  const taxman = bosses.some(b=>b.id==='taxman');
  const silencer = bosses.some(b=>b.id==='silencer');

  let chips = (typeof hand.base==='number') ? hand.base : sum;
  let mult = 1;
  let notes = [];

  const addChips = (n, label) => {
    if(taxman) n = Math.round(n/2);
    chips += n;
    notes.push(`${label}: ${n>=0?'+':''}${n} chips${taxman?' (halved by Taxman)':''}`);
  };
  const addMult = (n, label) => {
    if(silencer) { notes.push(`${label}: ignored (Silencer)`); return; }
    mult += n;
    notes.push(`${label}: +${n} Mult`);
  };
  const mulMult = (n, label) => {
    if(silencer) { notes.push(`${label}: ignored (Silencer)`); return; }
    mult *= n;
    notes.push(`${label}: x${n} Mult`);
  };

  if(bosses.some(b=>b.id==='oddtax') && vals.every(v=>v%2===1)){
    chips = 0; notes.push('Odd Tax: all-odd hand scored 0');
  }

  if(hasJoker('weighted1')){
    const ones = vals.filter(v=>v===1).length;
    if(ones>0) addChips(ones*9, 'Weighted 1');
  }
  if(hasJoker('twinprimes')){
    const primes=[2,3,5];
    const p = primes.find(pp=>vals.filter(v=>v===pp).length>=2);
    if(p) addChips(p*2, 'Twin Primes');
  }
  if(hasJoker('lowball') && sum<=10) addChips(30, 'Lowball');
  if(hasJoker('oddjob') && vals.every(v=>v%2===1)) addChips(40, 'Odd Job');
  if(hasJoker('jackpot') && hand.id==='five') addChips(200, 'Jackpot');
  if(hasJoker('momentum') && state.rerollsUsed>0) addChips(state.rerollsUsed*5, 'Momentum');
  if(hasJoker('minimalist') && state.rerollsUsed===0) addChips(50, 'Minimalist');
  if(hasJoker('straightshooter') && (hand.id==='smallstraight'||hand.id==='largestraight')) addChips(50,'Straight Shooter');
  if(hasJoker('pairbond') && hand.id==='twopair') addChips(50,'Pair Bond');
  if(hasJoker('voidwalker')) addChips(60, 'Void Walker (wild die removed)');

  if(useWild){
    const {index, ability} = state.wildDie;
    if(ability.id==='double') addChips(vals[index], 'Wild Die DOUBLE');
    if(ability.id==='lucky') addChips(25, 'Wild Die LUCKY');
    if(ability.id==='cursed') addChips(-15, 'Wild Die CURSED');
    if(ability.id==='rich') addChips(10, 'Wild Die RICH');
    if(ability.id==='jinxed'){
      const good = Math.random()<0.5;
      addChips(good?30:-30, `Wild Die JINXED (${good?'lucky':'unlucky'})`);
    }
    if(ability.id==='greedy') addMult(1, 'Wild Die GREEDY');
  }

  if(hasJoker('lucky7') && [7,17,27].includes(sum)) mulMult(3, 'Lucky 7');
  if(hasJoker('gambler') && vals.includes(1)){
    const ones = vals.filter(v=>v===1).length;
    mulMult(Math.pow(2,ones), "Gambler's Fallacy");
  }
  if(hasJoker('highroller') && sum>=24) addMult(2, 'High Roller');
  if(hasJoker('evensteven') && vals.every(v=>v%2===0)) mulMult(2, 'Even Steven');
  if(hasJoker('hotstreak') && state.hotStreakCount>0) addMult(state.hotStreakCount, 'Hot Streak');
  if(hasJoker('shattered') && (hand.id==='smallstraight'||hand.id==='largestraight')) mulMult(3, 'Shattered Die');
  if(hasJoker('fullhousefanatic') && hand.id==='fullhouse') mulMult(2, 'Full House Fanatic');

  chips = Math.max(0, chips);
  let total = Math.round(chips*mult);
  let doubleOrNothingNote = null;

  return {hand, chips, mult, total, notes, sum, vals, doubleOrNothingApplies: hasJoker('doubleornothing')};
}

function scoreHand(){
  const result = calcScore();
  let total = result.total;
  let notes = [...result.notes];

  if(result.doubleOrNothingApplies){
    const heads = Math.random()<0.5;
    if(heads){ total*=2; notes.push('Double or Nothing: HEADS x2'); }
    else { total=0; notes.push('Double or Nothing: TAILS — score wiped'); }
  }

  state.lastScoreText = `${result.hand.name} → ${result.chips} chips × ${result.mult.toFixed(1)} mult = ${total}`;
  addLog(state.lastScoreText + (notes.length? ' | '+notes.join('; '):''));

  if(result.hand.id==='chance'){ state.luckTokens = Math.min(5, state.luckTokens+1); }

  finishRound(total);
}

function finishRound(total){
  if(total >= state.anteTarget){
    let earned = Math.round(state.anteTarget/4) + Math.round(total/10);
    if(state.isMega) earned = Math.round(earned * 1.6) + 10;
    if(hasJoker('chainlightning')) earned += state.noBuyStreak;
    state.metaChips += earned;
    state.hotStreakCount++;
    addLog(`Ante cleared! +${earned} Chips banked.${state.isMega?' (Mega Boss bonus!)':''}`);
    state.round++;
    state.anteTarget = Math.round(state.anteTarget * 1.45);
    openShop();
  } else {
    state.hotStreakCount = 0;
    addLog(`Ante failed (${total} / ${state.anteTarget}). Run over.`);
    state.screen='gameover';
    render();
  }
}

function openShop(){
  const owned = new Set(state.jokers.map(j=>j.id));
  const pool = JOKER_POOL.filter(j=>!owned.has(j.id));
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  state.shopOffers = shuffled.slice(0,3);
  state.screen='shop';
  render();
}

function buyJoker(idx){
  const offer = state.shopOffers[idx];
  if(!offer) return;
  if(state.metaChips < offer.cost) return;
  if(state.jokers.length>=5){ addLog('Loaded Dice slots full (max 5). Sell one first.'); render(); return; }
  state.metaChips -= offer.cost;
  state.jokers.push({...offer, boughtFor: offer.cost});
  state.shopOffers[idx] = null;
  state.noBuyStreak = 0;
  addLog(`Equipped: ${offer.name} (-${offer.cost}¢)`);
  render();
}

function sellJoker(jid){
  const i = state.jokers.findIndex(j=>j.id===jid);
  if(i<0) return;
  const j = state.jokers[i];
  const sellPrice = Math.max(1, Math.floor((j.boughtFor||j.cost)/2));
  state.metaChips += sellPrice;
  state.jokers.splice(i,1);
  addLog(`Sold ${j.name} for ${sellPrice}¢`);
  render();
}

function skipShop(){
  state.noBuyStreak++;
  startRound();
}

function newRun(){
  state = freshState(0);
  startRound();
}

function showEncyclopedia(){
  state = state || freshState(0);
  state.screen = 'encyclopedia';
  render();
}
function backToIntro(){
  state.screen='intro';
  render();
}

/* ============== RENDER ============== */
function comboTable(){
  return `
  <table class="combos">
    <tr><th>Hand</th><th>Base</th></tr>
    ${HANDS.map(h=>`<tr><td>${h.name}</td><td>${typeof h.base==='number'?h.base+' chips':h.base}</td></tr>`).join('')}
  </table>`;
}

function render(){
  const root = document.getElementById('root');

  if(state.screen==='intro'){
    root.innerHTML = `
      <div class="panel overlay">
        <h2>Roll. Lock. Score.</h2>
        <p style="font-size:13px;color:#cfc8b8;text-align:left;">5 dice, 3 rerolls, build a hand. You start with <b>no Loaded Dice</b> —
        buy them from the shop after every round you clear. Each hand, one die at random gets a temporary
        <span style="color:var(--red)">Wild Ability</span>. Every 3rd round is a <b>Boss Blind</b>; every 6th is a
        <span class="megaboss">Mega Boss</span> — harder, double-nerfed, and pays out big.</p>
        <div class="controls">
          <button onclick="newRun()">START RUN</button>
          <button class="ghost" onclick="showEncyclopedia()">VIEW LOADED DICE &amp; WILD EFFECTS</button>
        </div>
      </div>
      <div class="panel">
        <h3 style="color:var(--gold);margin-top:0;">HAND REFERENCE</h3>
        ${comboTable()}
      </div>`;
    return;
  }

  if(state.screen==='encyclopedia'){
    root.innerHTML = `
      <div class="panel">
        <button class="secondary" onclick="backToIntro()">← BACK</button>
      </div>
      <div class="panel encyclopedia">
        <h3 style="color:var(--gold);margin-top:0;">LOADED DICE (${JOKER_POOL.length})</h3>
        ${JOKER_POOL.map(j=>`
          <div class="shop-card">
            <b>${j.name}</b><span class="rarity ${j.rarity}">${j.rarity}</span><span class="badge">${j.cost}¢ base</span>
            <p>${j.desc}</p>
          </div>`).join('')}
      </div>
      <div class="panel encyclopedia">
        <h3 style="color:var(--gold);margin-top:0;">WILD DIE EFFECTS (${WILD_ABILITIES.length})</h3>
        ${WILD_ABILITIES.map(a=>`
          <div class="shop-card">
            <b>${a.name}</b><span class="badge">${a.tag}</span>
            <p>${a.desc}</p>
          </div>`).join('')}
      </div>
      <div class="panel encyclopedia">
        <h3 style="color:var(--gold);margin-top:0;">BOSS BLINDS (${BOSS_BLINDS.length})</h3>
        ${BOSS_BLINDS.map(b=>`
          <div class="shop-card">
            <b>${b.name}</b>
            <p>${b.desc}</p>
          </div>`).join('')}
        <p style="font-size:11px;color:#9a9486;">Every 6th round is a <b style="color:#ff6b4a;">Mega Boss</b>: two Boss Blinds stack at once, the target is 35% higher, but clearing it pays a much bigger Chip bonus.</p>
      </div>`;
    return;
  }

  if(state.screen==='gameover'){
    root.innerHTML = `
      <div class="panel overlay">
        <h2>RUN OVER</h2>
        <p>You reached Round ${state.round}.</p>
        <p>Meta Chips banked: <b style="color:var(--gold)">${state.metaChips}</b></p>
        <button onclick="newRun()">NEW RUN</button>
      </div>`;
    return;
  }

  if(state.screen==='shop'){
    root.innerHTML = `
      <div class="panel">
        <div class="row"><div class="stat">Chips: <b>${state.metaChips}</b></div><div class="stat">Slots: <b>${state.jokers.length}/5</b></div></div>
      </div>
      <div class="panel">
        <h3 style="color:var(--gold);margin-top:0;">SHOP — pick a Loaded Die</h3>
        ${state.shopOffers.map((o,idx)=>{
          if(!o) return `<div class="shop-card" style="opacity:0.4;"><b>SOLD</b></div>`;
          return `
          <div class="shop-card">
            <b>${o.name}</b><span class="rarity ${o.rarity}">${o.rarity}</span><span class="badge">${o.cost}¢</span>
            <p>${o.desc}</p>
            <button onclick="buyJoker(${idx})" ${state.metaChips<o.cost?'disabled':''}>BUY</button>
          </div>`;
        }).join('')}
        <button class="secondary" onclick="skipShop()">SKIP → NEXT ROUND</button>
      </div>
      ${state.jokers.length? `
      <div class="panel">
        <div class="stat">YOUR LOADED DICE (sell anytime)</div>
        <div class="jokers">
          ${state.jokers.map(j=>`
            <div class="joker">
              <b>${j.name}</b>${j.desc}
              <div class="sellrow"><span style="color:#9a9486;">paid ${j.boughtFor}¢</span>
              <button class="small danger" onclick="sellJoker('${j.id}')">SELL ${Math.max(1,Math.floor(j.boughtFor/2))}¢</button></div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}
      ${renderLog()}
    `;
    return;
  }

  // hand screen
  const preview = calcScore();
  const bosses = activeBoss();

  root.innerHTML = `
    <div class="panel">
      <div class="row">
        <div class="stat">Ante <b>${state.round}</b></div>
        <div class="stat">Target: <b>${state.anteTarget}</b></div>
        <div class="stat">Chips: <b>${state.metaChips}</b></div>
      </div>
      ${bosses.map(b=>`<div class="stat ${state.isMega?'megaboss':'boss'}">⚠ ${state.isMega?'MEGA BOSS — ':''}${b.name}: ${b.desc}</div>`).join('')}
    </div>

    <div class="panel">
      <div class="dice-row">
        ${state.dice.map((v,i)=>{
          const isWild = state.wildDie && state.wildDie.index===i;
          const hideFace = state.hidden[i];
          return `
          <div class="die ${state.locked[i]?'locked':''} ${isWild?'wild':''}" onclick="toggleLock(${i})">
            ${isWild?`<div class="tag">${state.wildDie.ability.name}</div>`:''}
            ${hideFace? '?' : v}
            ${state.locked[i]?'<div class="lockedlabel">LOCKED</div>':''}
          </div>`;
        }).join('')}
      </div>
      <div class="sumline">Dice sum: <b>${diceSum()}</b></div>
      <div class="row" style="justify-content:center;gap:18px;">
        <div class="stat">Rerolls left: <b>${state.rerollsLeft}</b></div>
        <div class="stat">Luck Tokens: <b>${state.luckTokens}</b></div>
      </div>
      <div class="controls">
        <button onclick="doReroll()" ${state.rerollsLeft<=0?'disabled':''}>REROLL UNLOCKED</button>
        <button class="secondary" onclick="scoreHand()">SCORE HAND</button>
      </div>

      <div class="previewbox">
        <div>If you lock this in: <span class="big">${preview.total}</span> ${preview.doubleOrNothingApplies?' (before Double or Nothing flip)':''}</div>
        <div class="breakdown">${preview.hand.name} • ${preview.chips} chips × ${preview.mult.toFixed(1)} mult</div>
        ${preview.notes.length? `<div class="breakdown">${preview.notes.join(' · ')}</div>`:''}
      </div>

      ${state.wildDie? `<div class="hand-readout" style="color:var(--red)">Wild Die: ${state.wildDie.ability.name} — ${state.wildDie.ability.desc}</div>`:''}
    </div>

    <div class="panel">
      <div class="stat">LOADED DICE ${state.jokers.length===0? '<span style="color:#9a9486;">(none yet — buy some after this round)</span>':''}</div>
      <div class="jokers">
        ${state.jokers.map(j=>`<div class="joker"><b>${j.name}</b>${j.desc}</div>`).join('')}
      </div>
    </div>

    <details class="refbox">
      <summary>Hand reference</summary>
      <div class="panel">${comboTable()}</div>
    </details>

    ${renderLog()}
  `;
}

function renderLog(){
  return `<div class="panel"><div class="log">${state.log.map(l=>`<div>${l}</div>`).join('')}</div></div>`;
}

state = freshState(0);
render();
</script>
</body>
</html>
